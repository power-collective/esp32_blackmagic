; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = main
lib_dir = components


[env:m5stack-atom]
board = m5stack-atom
platform = espressif32 @ ^6.3.2
framework = espidf
board_build.partitions = partitions.csv
board_build.flash_size = 4MB
build_unflags = -Werror=all
build_flags =
    -I libopencm3/include
    -Wno-error=incompatible-pointer-types
    -Wno-error=implicit-function-declaration
    -DTMS_PIN=21
    -DTDI_PIN=22
    -DTDO_PIN=19
    -DTCK_PIN=25
    -DSWDIO_PIN=21
    -DSWCLK_PIN=25
    -DNRST_PIN=23
    -DTRACESWO_PIN=33
    -DTRACESWO_DUMMY_TX=18
    -DMODE_SELECT_BUTTON_PIN=39
upload_port = /dev/cu.usbserial-4D56D41EB6
monitor_port = /dev/cu.usbserial-4D56D41EB6
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

[env:c3mini]
platform = espressif32
framework = espidf
board_build.partitions = partitions.csv
board_build.flash_size = 4MB
board = esp32-c3-devkitm-1
build_unflags = -Werror=all
monitor_speed = 460800
build_flags =
    -I libopencm3/include
    -Wno-error=incompatible-pointer-types
    -Wno-error=implicit-function-declaration
    ; SWD pins (pin 3 has pullup, pin 2 has series resistor)
    -DSWDIO_PIN=3
    -DSWCLK_PIN=2
    ; TMS/TCK alias to SWD pins for SWD mode
    -DTMS_PIN=3
    -DTCK_PIN=2
    ; JTAG-only pins not used (TDI/TDO)
    -DTDI_PIN=-1
    -DTDO_PIN=-1
    -DNRST_PIN=-1
    -DTRACESWO_PIN=-1
    -DTRACESWO_DUMMY_TX=-1
    -DMODE_SELECT_BUTTON_PIN=9
